name: Deploy Pages Only

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "public/**"
      - "next.config.ts"
      - "next-intl.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages-only.yml"
  workflow_dispatch:

concurrency:
  group: pages-only-production
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install Dependencies
        timeout-minutes: 12
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build Pages Output
        run: npm run build:pages

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b4b8dcfc255e892c7913083b835930a8
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "CLOUDFLARE_API_TOKEN is empty" && exit 1)
          npx wrangler --version
          npx wrangler whoami
          npx wrangler pages deploy .vercel/output/static --project-name moemail --branch main
